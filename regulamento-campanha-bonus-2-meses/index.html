<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LECO | Regulamento da Campanha</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/jpeg" href="/Logo/Logo.png.jpeg">
    <link rel="shortcut icon" type="image/jpeg" href="/Logo/Logo.png.jpeg">
    <link rel="apple-touch-icon" href="/Logo/Logo.png.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/campaign.css">
    <link rel="stylesheet" href="/legal.css">
    <script src="/legal-document.js" defer></script>
</head>
<body>
    <main class="legal-page">
        <header class="legal-header">
            <div class="legal-header-inner">
                <a href="/" class="legal-brand" aria-label="Voltar para o site LECO">
                    <img src="/Logo/Logo.png.jpeg" alt="LECO">
                    <span>LECO</span>
                </a>
                <div class="legal-header-actions">
                    <button type="button" class="legal-header-back" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='/privacidade/'; }">Voltar</button>
                    <a href="/privacidade/" class="legal-header-link">Central de Privacidade</a>
                </div>
            </div>
        </header>

        <section
            class="legal-content legal-document-page"
            data-legal-document-page
            data-doc-src="/regulamento_campanha_bonus_2_meses_leco.txt"
            data-doc-pdf="/regulamento_campanha_bonus_2_meses_leco.pdf"
        >
            <div class="legal-hero">
                <div class="legal-eyebrow">Documento oficial</div>
                <h1>Regulamento da Campanha</h1>
                <p>Leia abaixo o regulamento oficial da campanha de 2 meses de bônus do LECO, em formato de leitura contínua e com acesso ao PDF oficial como referência.</p>
            </div>

            <div class="legal-document-layout">
                <article class="legal-text-card">
                    <div class="legal-document-prose" data-legal-document>
                        <p class="legal-document-loading">Carregando o conteúdo do documento...</p>
                    </div>
                </article>

                <aside class="legal-summary-panel" data-legal-summary></aside>
            </div>
        </section>
    </main>
    <script src="/campaign.js"></script>
</body>
</html>
